<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTaF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGMP | Launcher del Sistema</title>
  <style>
    :root{
      --navy:#061B4D;
      --blue:#055BEF;
      --cyan:#00BFFF;
      --green:#159653;
      --purple:#6B2BEA;
      --ink:#06183D;
      --muted:#53627A;
      --line:rgba(20,82,163,.16);
      --shadow:0 18px 45px rgba(7,38,86,.13);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100%}

    body{
      font-family:"Segoe UI",Inter,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 50% 42%, rgba(52,143,255,.18), transparent 34%),
        radial-gradient(circle at 8% 20%, rgba(5,102,255,.12), transparent 25%),
        radial-gradient(circle at 92% 22%, rgba(111,44,232,.10), transparent 28%),
        linear-gradient(180deg,#f8fbff 0%,#eef6ff 54%,#f9fcff 100%);
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.58;
      background:
        radial-gradient(circle at 50% 56%, transparent 0 20%, rgba(5,102,255,.075) 20.2% 20.5%, transparent 20.7%),
        radial-gradient(circle at 50% 56%, transparent 0 29%, rgba(5,102,255,.060) 29.2% 29.5%, transparent 29.7%),
        radial-gradient(circle at 50% 56%, transparent 0 38%, rgba(5,102,255,.040) 38.2% 38.5%, transparent 38.7%);
    }

    button,input{font:inherit}

    .launcher{
      width:min(1600px,100%);
      height:100svh;
      margin:0 auto;
      padding:clamp(8px,1.1vh,14px) clamp(16px,1.7vw,28px) clamp(12px,1.5vh,18px);
      display:grid;
      grid-template-rows:auto auto minmax(0,1fr) auto;
      gap:clamp(5px,.8vh,10px);
      overflow:hidden;
      position:relative;
      z-index:1;
    }

    .header{
      position:relative;
      text-align:center;
    }

    .header h1{
      font-size:clamp(58px,7.4vh,100px);
      line-height:.78;
      font-weight:950;
      letter-spacing:.03em;
      color:var(--navy);
    }

    .header h2{
      margin-top:clamp(5px,.65vh,9px);
      font-size:clamp(18px,2.35vh,30px);
      line-height:1.05;
      font-weight:900;
      color:#081a4d;
    }

    .triad{
      display:flex;
      justify-content:center;
      gap:clamp(14px,2.4vw,34px);
      flex-wrap:wrap;
      margin-top:clamp(6px,.75vh,10px);
      font-size:clamp(13px,1.55vh,18px);
      font-weight:750;
    }

    .triad span:nth-child(1){color:var(--blue)}
    .triad span:nth-child(2){color:var(--green)}
    .triad span:nth-child(3){color:var(--purple)}

    .top-actions{
      position:absolute;
      top:0;
      right:0;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .user-pill,.top-btn,.top-pill{
      border-radius:13px;
      padding:9px 14px;
      border:1px solid rgba(5,102,255,.16);
      background:rgba(255,255,255,.78);
      color:#0B2458;
      font-weight:900;
      box-shadow:0 8px 18px rgba(7,38,86,.08);
      cursor:pointer;
    }

    .status-strip{
      width:min(930px,100%);
      margin:0 auto;
      text-align:center;
      background:rgba(255,255,255,.78);
      border:1px solid var(--line);
      border-radius:18px;
      color:#214a97;
      padding:clamp(9px,1.15vh,13px) 18px;
      font-weight:850;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }

    .stage-wrap{min-height:0;width:100%}

    .launcher-stage{
      height:100%;
      min-height:0;
      display:grid;
      grid-template-columns:minmax(300px,410px) minmax(420px,1fr) minmax(300px,410px);
      gap:clamp(16px,2.2vw,36px);
      align-items:center;
    }

    .module-column{
      display:flex;
      flex-direction:column;
      gap:clamp(10px,1.35vh,18px);
      justify-content:center;
      min-height:0;
      z-index:3;
    }

    .sgmp-core{
      position:relative;
      height:100%;
      min-height:0;
      display:grid;
      place-items:center;
      isolation:isolate;
    }

    .core-avatar{
      position:relative;
      width:min(54vh,530px,96%);
      aspect-ratio:1/1;
      display:grid;
      place-items:center;
      border-radius:50%;
      z-index:5;
      animation:float 5.6s ease-in-out infinite;
    }

    .core-avatar::before{
      content:"";
      position:absolute;
      width:96%;
      height:96%;
      border-radius:50%;
      border:2px solid rgba(5,102,255,.38);
      box-shadow:0 0 34px rgba(0,136,255,.18), inset 0 0 44px rgba(0,136,255,.10);
    }

    .core-avatar::after{
      content:"";
      position:absolute;
      width:74%;
      height:74%;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,191,255,.20), transparent 62%);
      filter:blur(4px);
      z-index:-1;
    }

    .core-avatar img{
      width:82%;
      height:82%;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 24px 36px rgba(0,61,145,.22));
      transition:.35s ease;
    }

    .core-avatar:hover img{
      transform:scale(1.035) translateY(-4px);
      filter:drop-shadow(0 32px 44px rgba(0,96,205,.32));
    }

    .core-avatar.fallback::before{
      content:"SGMP";
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.60);
      color:var(--navy);
      font-size:clamp(44px,6vw,86px);
      font-weight:950;
    }

    .orbit{
      position:absolute;
      border-radius:50%;
      border:1.5px solid rgba(5,102,255,.24);
      box-shadow:0 0 36px rgba(0,136,255,.08);
      z-index:1;
    }

    .o1{width:72%;aspect-ratio:1/1}
    .o2{width:88%;aspect-ratio:1/1;opacity:.72}
    .o3{width:56%;aspect-ratio:1/1;opacity:.65}

    .core-node{
      position:absolute;
      width:clamp(80px,9.2vh,112px);
      min-height:clamp(62px,7.8vh,86px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:5px;
      border-radius:20px;
      background:rgba(255,255,255,.78);
      border:1px solid rgba(0,112,255,.18);
      box-shadow:0 10px 28px rgba(7,38,86,.10);
      backdrop-filter:blur(10px);
      z-index:6;
    }

    .core-node .ico{font-size:clamp(24px,3.1vh,32px);line-height:1}
    .core-node b{font-size:clamp(10px,1.3vh,13px);letter-spacing:.04em}

    .core-process{top:5%;left:50%;transform:translateX(-50%);color:var(--blue)}
    .core-people{left:2%;top:52%;transform:translateY(-50%);color:var(--green)}
    .core-tech{right:2%;top:52%;transform:translateY(-50%);color:var(--purple)}

    .dot{
      position:absolute;
      width:12px;
      height:12px;
      border-radius:50%;
      background:#fff;
      border:2px solid #1983ff;
      box-shadow:0 0 14px rgba(0,112,255,.45);
      z-index:4;
      animation:dotPulse 2.4s ease-in-out infinite;
    }

    .d1{top:20%;left:31%}
    .d2{top:20%;right:31%;animation-delay:.4s}
    .d3{top:52%;left:16%;animation-delay:.8s}
    .d4{top:52%;right:16%;animation-delay:1.2s}

    .core-badge{
      position:absolute;
      bottom:1%;
      left:50%;
      transform:translateX(-50%);
      min-width:min(460px,92%);
      border-radius:22px;
      background:#061B4D;
      color:#fff;
      padding:clamp(12px,1.5vh,18px) clamp(18px,2vw,28px);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      box-shadow:0 18px 38px rgba(7,38,86,.25);
      z-index:7;
    }

    .core-badge strong{font-size:clamp(22px,2.6vh,34px);letter-spacing:.03em}
    .core-badge span{font-weight:750;font-size:clamp(12px,1.5vh,16px);text-transform:uppercase;opacity:.9}

    .module-card{
      position:relative;
      min-height:clamp(112px,14.2vh,150px);
      max-height:150px;
      display:grid;
      grid-template-columns:35% 1fr 28px;
      align-items:stretch;
      overflow:hidden;
      border-radius:16px;
      background:rgba(255,255,255,.88);
      border:1px solid rgba(20,82,163,.16);
      box-shadow:var(--shadow);
      cursor:pointer;
      transition:.25s ease;
      backdrop-filter:blur(10px);
    }

    .module-card.disabled{opacity:.50;cursor:not-allowed}

    .module-card::before{
      content:"";
      position:absolute;
      inset:0 auto 0 0;
      width:7px;
      background:var(--accent);
      z-index:3;
    }

    .module-card:hover{
      transform:translateY(-6px) scale(1.012);
      box-shadow:0 26px 52px rgba(7,38,86,.18);
      border-color:color-mix(in srgb, var(--accent), white 45%);
    }

    .module-avatar{
      background:linear-gradient(135deg, color-mix(in srgb, var(--accent), #001A44 60%), rgba(255,255,255,.16));
      overflow:hidden;
      display:flex;
      align-items:stretch;
      justify-content:center;
    }

    .module-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center top;
      display:block;
    }

    .module-body{
      padding:clamp(10px,1.25vh,16px) clamp(11px,1.1vw,16px);
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-width:0;
    }

    .module-row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}

    .module-body h3{
      font-size:clamp(19px,2.45vh,27px);
      line-height:1;
      color:var(--accent);
      font-weight:950;
      letter-spacing:.01em;
    }

    .module-code{
      display:block;
      margin-top:3px;
      color:var(--navy);
      font-size:clamp(14px,1.9vh,19px);
      font-weight:900;
    }

    .module-name{
      margin-top:5px;
      font-weight:750;
      color:#0d2551;
      font-size:clamp(11px,1.45vh,14px);
      line-height:1.2;
    }

    .module-line{width:68%;height:1px;background:color-mix(in srgb,var(--accent),white 58%);margin:7px 0 6px}

    .module-slogan{
      color:var(--accent);
      font-weight:800;
      font-size:clamp(11px,1.45vh,14px);
      line-height:1.2;
    }

    .module-icon{
      display:grid;
      place-items:center;
      width:clamp(34px,4.5vh,46px);
      height:clamp(34px,4.5vh,46px);
      color:var(--accent);
      font-weight:950;
      font-size:16px;
      border:2px solid currentColor;
      clip-path:polygon(25% 5%,75% 5%,100% 50%,75% 95%,25% 95%,0 50%);
      background:rgba(255,255,255,.72);
      flex:0 0 auto;
    }

    .module-arrow{
      display:grid;
      place-items:center;
      color:#0B1E4E;
      font-size:clamp(28px,4.2vh,36px);
      padding-right:6px;
    }

    .empty-state{
      border:1px dashed rgba(20,82,163,.22);
      border-radius:18px;
      background:rgba(255,255,255,.72);
      color:var(--muted);
      padding:28px;
      text-align:center;
      font-weight:700;
      box-shadow:var(--shadow);
    }

    .loading-overlay{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:48px 20px;
      gap:14px;
      color:var(--muted);
      font-weight:700;
    }

    .spinner{
      width:34px;
      height:34px;
      border:3px solid rgba(5,102,255,.14);
      border-top-color:var(--blue);
      border-radius:50%;
      animation:spin .7s linear infinite;
    }

    .footer-note{text-align:center;color:#60789b;font-size:clamp(11px,1.25vh,14px);font-weight:700}

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(5,20,54,.54);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:100;
      backdrop-filter:blur(7px);
    }

    .modal-backdrop.show{display:flex}

    .modal{
      width:min(440px,100%);
      background:rgba(248,251,255,.96);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:0 26px 64px rgba(7,38,86,.22);
      padding:28px 24px;
    }

    .modal-title{margin:0 0 20px;color:var(--navy);font-size:1.22rem;font-weight:900}

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:14px;
    }

    .field label{color:#4d6790;font-size:.88rem;font-weight:800}

    .field input{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(20,82,163,.18);
      background:#fff;
      color:var(--ink);
      padding:12px 13px;
      outline:none;
    }

    .field input:focus{border-color:#90afe8;box-shadow:0 0 0 4px rgba(40,82,191,.10)}

    .main-btn{
      border-radius:12px;
      padding:10px 16px;
      cursor:pointer;
      background:linear-gradient(135deg,#0566FF,#2f57d0);
      color:#fff;
      border:1px solid #2950c8;
      font-weight:900;
    }

    .msg{display:none;margin-bottom:14px;border-radius:12px;padding:11px 13px;font-size:.92rem;font-weight:700}
    .msg.show{display:block}
    .msg.error{background:#fff4f4;color:#b43f3f;border:1px solid #f0c9c9}

    .tools-row{display:flex;justify-content:flex-end;gap:10px;margin-top:6px}

    .validation-ribbon{
      position:fixed;
      left:14px;
      bottom:12px;
      z-index:9999;
      background:#061B4D;
      color:#fff;
      border-radius:999px;
      padding:7px 11px;
      font-size:11px;
      font-weight:900;
      letter-spacing:.04em;
      opacity:.86;
    }

    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes dotPulse{0%,100%{transform:scale(1);opacity:.75}50%{transform:scale(1.25);opacity:1}}

    @media(max-width:1180px){
      body{overflow:auto}
      .launcher{height:auto;min-height:100svh;overflow:visible;display:block;padding:18px 16px 28px}
      .top-actions{position:static;justify-content:center;margin-top:12px}
      .status-strip{margin:16px auto}
      .launcher-stage{grid-template-columns:1fr}
      .sgmp-core{order:-1;min-height:540px}
      .module-column{display:grid;grid-template-columns:repeat(2,minmax(260px,1fr))}
      .core-badge{bottom:4%}
    }

    @media(max-width:720px){
      .header h1{font-size:clamp(52px,18vw,86px)}
      .header h2{font-size:clamp(17px,5vw,24px)}
      .sgmp-core{min-height:460px}
      .core-avatar{width:min(420px,100%)}
      .core-node{width:82px;min-height:68px}
      .core-people{left:0}
      .core-tech{right:0}
      .module-column{grid-template-columns:1fr}
      .module-card{min-height:145px;grid-template-columns:38% 1fr 24px}
      .module-icon{display:none}
    }

    @media(max-width:430px){
      .sgmp-core{min-height:405px}
      .core-node{width:78px}
      .module-body{padding:12px}
      .module-body h3{font-size:20px}
      .module-code{font-size:16px}
      .module-name,.module-slogan{font-size:12px}
      .module-arrow{font-size:28px}
    }
  </style>
</head>
<body>
<main class="launcher">
  <header class="header">
    <div class="top-actions">
      <span class="user-pill" id="userPill" style="display:none"></span>
      <button class="top-btn" id="logoutBtn" style="display:none" type="button">Cerrar sesión</button>
      <button class="top-pill" id="versionPill" type="button">v1.0</button>
    </div>

    <h1 id="heroTitle">SGMP</h1>
    <h2 id="heroSubtitle">Sistema de Gestión y Mejora de Procesos</h2>
    <div class="triad">
      <span>Procesos inteligentes.</span>
      <span>Personas comprometidas.</span>
      <span>Tecnología que transforma.</span>
    </div>
  </header>

  <section class="status-strip" id="statusStrip">Conectando con el sistema...</section>

  <section class="stage-wrap" id="modulesGrid" aria-label="Módulos SGMP">
    <div class="loading-overlay">
      <div class="spinner"></div>
      Cargando módulos...
    </div>
  </section>

  <div class="footer-note" id="footerNote">Portal SGMP · Los accesos se cargan desde configuración central.</div>
</main>

<div class="validation-ribbon">FINAL CENTRAL · SCRIPTOR</div>

<div class="modal-backdrop" id="loginModal">
  <div class="modal">
    <h3 class="modal-title">Acceso al sistema</h3>
    <div class="msg error" id="loginErr"></div>
    <div class="field">
      <label for="loginUser">Usuario</label>
      <input id="loginUser" type="text" autocomplete="username" placeholder="tu_usuario" />
    </div>
    <div class="field">
      <label for="loginPass">Contraseña</label>
      <input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <div class="tools-row">
      <button class="main-btn" id="doLoginBtn" type="button">Ingresar</button>
    </div>
  </div>
</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbyQZi1flaILc4e3I7MFp8gLctkzC6VccjfFz5aHluMrGZLwOUeS3uQaHPsMZ3l5yfDw-Q/exec';
var SESSION_KEY = 'sgmp_session_v1';
var SESSION = loadSession();

var VISUALS = {
  LMP: {agent:'SYNAPSE', fallbackName:'Laboratorio de Mejora de Procesos', fallbackDescription:'Analiza. Diseña. Transforma.', avatar:'./assets/avatars/a_lmp.jpg', accent:'#055BEF', icon:'🧠'},
  SB:  {agent:'BUILDER', fallbackName:'SIPOC Builder', fallbackDescription:'Visualiza. Ordena. Construye.', avatar:'./assets/avatars/a_sb.jpg', accent:'#1769E8', icon:'🔗'},
  ED:  {agent:'DOCSYS', fallbackName:'Evaluador Documental', fallbackDescription:'Evalúa. Filtra. Asegura.', avatar:'./assets/avatars/a_ed.jpg', accent:'#4A5568', icon:'📄'},
  GD:  {agent:'SCRIPTOR', fallbackName:'Generador Documental', fallbackDescription:'Construye. Estandariza. Entrega.', avatar:'./assets/avatars/a_gd.jpg', accent:'#6F2CE8', icon:'📝'},
  AD:  {agent:'AUDIX', fallbackName:'Auditor Documental', fallbackDescription:'Audita. Mejora. Asegura.', avatar:'./assets/avatars/a_ad.jpg', accent:'#C0392B', icon:'🛡️'}
};

function init(){
  apiGet('get_all')
    .then(function(res){
      if(!res.ok){ showError('No se pudo conectar con el sistema.'); return; }

      var cfg = res.data.global || {};
      var modules = res.data.modules || [];

      var version = cfg.app_version || 'v1.0';
      var support = cfg.support_text || 'Portal SGMP · Los accesos se cargan desde configuración central.';

      document.getElementById('heroTitle').textContent = 'SGMP';
      document.getElementById('heroSubtitle').textContent = cfg.app_subtitle || 'Sistema de Gestión y Mejora de Procesos';
      document.getElementById('versionPill').textContent = version;
      document.getElementById('footerNote').textContent = support;
      document.title = cfg.app_name || 'SGMP';

      var loginRequired = cfg.login_required === 'SI';

      if(loginRequired && !SESSION.username){
        showLoginModal(modules);
      } else {
        renderModules(applyPermissions(modules));
        showUser();
      }
    })
    .catch(function(){ showError('Error de conexión. Verifica tu acceso a internet.'); });
}

function applyPermissions(modules){
  if(!SESSION || !SESSION.username || !Array.isArray(SESSION.allowed_modules)) return modules;
  return modules.filter(function(m){ return SESSION.allowed_modules.indexOf(m.code) !== -1; });
}

function showUser(){
  if(SESSION.username){
    document.getElementById('userPill').textContent = '👤 ' + (SESSION.name || SESSION.username);
    document.getElementById('userPill').style.display = 'inline-block';
    document.getElementById('logoutBtn').style.display = 'inline-block';
  }
}

function showLoginModal(modules){
  document.getElementById('loginModal').classList.add('show');
  document.getElementById('statusStrip').textContent = 'Ingresa tus credenciales para acceder al sistema.';
  document.getElementById('modulesGrid').innerHTML = '<div class="empty-state">Ingresa sesión para ver los módulos disponibles.</div>';

  document.getElementById('doLoginBtn').onclick = function(){ doLogin(modules); };
  document.getElementById('loginPass').addEventListener('keydown', function(e){ if(e.key === 'Enter') doLogin(modules); });
}

function doLogin(modules){
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  var err = document.getElementById('loginErr');
  var btn = document.getElementById('doLoginBtn');

  if(!u || !p){ showMsg(err,'Ingresa usuario y contraseña.'); return; }

  btn.textContent='Verificando...';
  btn.disabled=true;

  apiGet('user_login', {username:u,password:p})
    .then(function(res){
      if(res.ok){
        SESSION = {
          username:(res.user && res.user.username) || u,
          name:(res.user && res.user.name) || u,
          role:(res.user && res.user.role) || '',
          allowed_modules:res.allowed_modules || []
        };
        saveSession(SESSION);
        document.getElementById('loginModal').classList.remove('show');
        renderModules(applyPermissions(modules));
        showUser();
      } else {
        showMsg(err,res.error || 'Credenciales incorrectas.');
        btn.textContent='Ingresar';
        btn.disabled=false;
      }
    })
    .catch(function(){
      showMsg(err,'Error de conexión.');
      btn.textContent='Ingresar';
      btn.disabled=false;
    });
}

document.getElementById('logoutBtn').addEventListener('click', function(){
  clearSession();
  location.reload();
});

function renderModules(modules){
  var grid = document.getElementById('modulesGrid');
  var strip = document.getElementById('statusStrip');

  var visible = modules
    .filter(function(m){ return m.enabled === 'SI' || m.enabled === true; })
    .sort(function(a,b){ return (Number(a.order)||0) - (Number(b.order)||0); });

  grid.innerHTML='';

  if(!visible.length){
    grid.innerHTML='<div class="empty-state">No hay módulos activos. El administrador debe activar los módulos desde el panel de configuración.</div>';
    strip.textContent='No hay módulos disponibles en este momento.';
    return;
  }

  var stage = document.createElement('div');
  stage.className = 'launcher-stage';

  var left = document.createElement('div');
  left.className = 'module-column';

  var center = document.createElement('section');
  center.className = 'sgmp-core';
  center.innerHTML =
    '<div class="orbit o1"></div><div class="orbit o2"></div><div class="orbit o3"></div>' +
    '<div class="core-node core-process"><span class="ico">⚙</span><b>PROCESOS</b></div>' +
    '<div class="core-node core-people"><span class="ico">👥</span><b>PERSONAS</b></div>' +
    '<div class="core-node core-tech"><span class="ico">▣</span><b>TECNOLOGÍA</b></div>' +
    '<span class="dot d1"></span><span class="dot d2"></span><span class="dot d3"></span><span class="dot d4"></span>' +
    '<a class="core-avatar" href="#" aria-label="SGMP"><img src="./assets/avatars/a_sgmp.jpg" alt="SGMP" onerror="this.closest(\\'.core-avatar\\').classList.add(\\'fallback\\');this.remove();"></a>' +
    '<div class="core-badge"><strong>SGMP</strong><span>Launcher del Sistema</span></div>';

  var right = document.createElement('div');
  right.className = 'module-column';

  visible.forEach(function(mod){
    var code = String(mod.code || '').toUpperCase();
    var v = VISUALS[code] || {agent:code || 'MOD', fallbackName:mod.name || 'Módulo SGMP', fallbackDescription:mod.description || 'Abrir módulo.', avatar:'./assets/avatars/a_sgmp.jpg', accent:'#055BEF', icon:'◌'};

    var card = document.createElement('article');
    card.className = 'module-card' + ((!mod.url || mod.url === '#') ? ' disabled' : '');
    card.style.setProperty('--accent', v.accent);
    card.setAttribute('role','button');
    card.setAttribute('tabindex','0');

    var cardTitle = mod.name || v.fallbackName;
    var cardDescription = mod.description || v.fallbackDescription;

    card.innerHTML =
      '<div class="module-avatar"><img src="' + esc(v.avatar) + '" alt="' + esc(v.agent + ' ' + code) + '"></div>' +
      '<div class="module-body">' +
        '<div class="module-row">' +
          '<div><h3>' + esc(v.agent) + '</h3><span class="module-code">' + esc(code) + '</span></div>' +
          '<div class="module-icon">' + esc(v.icon) + '</div>' +
        '</div>' +
        '<div class="module-name">' + esc(cardTitle) + '</div>' +
        '<div class="module-line"></div>' +
        '<div class="module-slogan">' + esc(cardDescription) + '</div>' +
      '</div>' +
      '<div class="module-arrow">›</div>';

    function openModule(){
      if(mod.url && mod.url !== '#') window.location.href = mod.url;
    }

    card.addEventListener('click', openModule);
    card.addEventListener('keydown', function(e){ if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openModule(); } });

    if(['LMP','SB','ED'].indexOf(code) !== -1) left.appendChild(card);
    else right.appendChild(card);
  });

  stage.appendChild(left);
  stage.appendChild(center);
  stage.appendChild(right);
  grid.appendChild(stage);

  strip.textContent = 'Selecciona el avatar del módulo que deseas abrir · ' + visible.map(function(m){return m.order + '-' + m.code;}).join(' · ');
}

function apiGet(action, params){
  var url = API + '?action=' + encodeURIComponent(action);
  if(params){
    Object.keys(params).forEach(function(k){ url += '&' + k + '=' + encodeURIComponent(params[k]); });
  }
  return fetch(url).then(function(r){ return r.json(); });
}

function loadSession(){
  try{ var raw = sessionStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : {}; }catch(e){ return {}; }
}

function saveSession(data){ try{ sessionStorage.setItem(SESSION_KEY, JSON.stringify(data)); }catch(e){} }
function clearSession(){ try{ sessionStorage.removeItem(SESSION_KEY); }catch(e){} }

function esc(str){
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function showMsg(el,msg){ el.textContent=msg; el.className='msg error show'; }

function showError(msg){
  document.getElementById('statusStrip').textContent=msg;
  document.getElementById('modulesGrid').innerHTML='<div class="empty-state">⚠️ ' + esc(msg) + '</div>';
}

init();
</script>
</body>
</html>
