<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGMP</title>
  <style>
    :root {
      --bg: #eef3f9;
      --bg-2: #e7edf6;
      --panel: #ffffff;
      --line: #c9d5e6;
      --line-soft: #dbe4f0;
      --text: #17315c;
      --text-soft: #556f96;
      --title: #132b52;
      --primary: #2548b8;
      --primary-2: #2f57d0;
      --primary-3: #1d3eaa;
      --primary-soft: #edf3ff;
      --green: #1faa54;
      --green-2: #0d9c46;
      --danger: #d84c4c;
      --warning: #d18d18;
      --shadow: 0 8px 18px rgba(28,55,115,0.10);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      min-height: 100vh;
    }

    button, input, textarea { font: inherit; }

    .app-shell {
      width: min(1860px, calc(100% - 20px));
      margin: 20px auto;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #1a2f66 0%, #2347b7 65%, #2f57d0 100%);
      color: #fff;
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .brand-title {
      margin: 0 0 8px;
      font-size: clamp(1.65rem, 2.6vw, 2.2rem);
      font-weight: 800;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-subtitle {
      margin: 0;
      color: rgba(255,255,255,0.88);
      font-size: 1rem;
      line-height: 1.5;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-btn, .top-pill, .main-btn, .ghost-btn, .danger-btn, .success-btn {
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: 0.18s ease;
      text-decoration: none;
    }

    .top-btn {
      background: rgba(255,255,255,0.10);
      color: #fff;
      border-color: rgba(255,255,255,0.18);
      font-weight: 700;
    }

    .top-pill {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border-color: rgba(255,255,255,0.18);
      font-weight: 800;
      min-width: 72px;
    }

    .top-btn:hover { transform: translateY(-1px); }

    /* ── INFO STRIP ── */
    .info-strip {
      margin-top: 16px;
      background: #edf4ff;
      border: 1px solid #b9cdef;
      color: #214a97;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
    }

    /* ── MAIN PANEL ── */
    .main-panel {
      margin-top: 28px;
      background: rgba(255,255,255,0.86);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 22px 20px 20px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .panel-title {
      margin: 0;
      color: var(--title);
      font-size: 1.05rem;
      font-weight: 800;
    }

    .panel-meta { color: var(--text-soft); font-size: 0.95rem; font-weight: 600; }

    /* ── MÓDULOS GRID ── */
    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }

    .module-card {
      appearance: none;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
      padding: 18px 16px;
      text-align: left;
      color: var(--text);
      box-shadow: 0 4px 10px rgba(30,64,140,0.05);
      min-height: 190px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: 0.2s ease;
    }

    .module-card:hover {
      border-color: #b7caea;
      box-shadow: 0 10px 20px rgba(27,59,128,0.10);
      transform: translateY(-2px);
    }

    .module-card.disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .module-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 5px;
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
    }

    .module-code {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      min-width: 60px;
      padding: 8px 12px;
      border-radius: 10px;
      background: var(--primary-soft);
      color: #1f47c4;
      font-weight: 800;
      border: 1px solid #c8d8f7;
      margin-top: 4px;
    }

    .module-name {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--title);
      line-height: 1.28;
    }

    .module-description {
      color: var(--text-soft);
      line-height: 1.55;
      font-size: 0.96rem;
      flex: 1;
    }

    .module-seq {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #5a7194;
      font-size: 0.9rem;
      font-weight: 700;
      padding-top: 6px;
      border-top: 1px solid #e1e8f3;
    }

    .empty-state {
      border: 1px dashed #b8c7dd;
      border-radius: 18px;
      background: #f7faff;
      color: var(--text-soft);
      padding: 28px;
      text-align: center;
      font-weight: 600;
    }

    /* ── BOTONES ── */
    .main-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      border: 1px solid #2950c8;
      font-weight: 800;
    }

    .ghost-btn {
      background: #f6f9fe;
      color: #355483;
      border: 1px solid var(--line);
      font-weight: 700;
    }

    /* ── MODALES ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(14,27,54,0.48);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 100;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: min(440px, 100%);
      background: #f8fbff;
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 22px 52px rgba(20,42,87,0.18);
      padding: 28px 24px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .modal-title {
      margin: 0;
      color: var(--title);
      font-size: 1.2rem;
      font-weight: 800;
    }

    .close-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: #3e5c8e;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 800;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field label {
      color: #4d6790;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #cad6e7;
      background: #fff;
      color: var(--text);
      padding: 11px 12px;
      outline: none;
    }

    .field input:focus {
      border-color: #90afe8;
      box-shadow: 0 0 0 3px rgba(40,82,191,0.10);
    }

    .msg {
      display: none;
      margin-bottom: 14px;
      border-radius: 10px;
      padding: 11px 13px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .msg.show { display: block; }
    .msg.error { background: #fff4f4; color: #b43f3f; border: 1px solid #f0c9c9; }
    .msg.ok    { background: #eefbf3; color: #178243; border: 1px solid #bfe8ce; }

    .tools-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      margin-top: 6px;
    }

    /* ── LOADING ── */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      gap: 14px;
      color: var(--text-soft);
      font-weight: 600;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #dbe4f0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      color: #60789b;
      font-size: 0.88rem;
      font-weight: 600;
    }

    /* ── USER PILL ── */
    .user-pill {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.88rem;
      font-weight: 700;
    }

    @media (max-width: 960px) {
      .hero { flex-direction: column; align-items: stretch; }
      .hero-actions { justify-content: flex-start; }
      .modules-grid { grid-template-columns: 1fr; }
    }

<body>
<div class="app-shell">

  <!-- HERO -->
  <section class="hero">
    <div>
      <h1 class="brand-title" id="heroTitle">⚙️ SGMP</h1>
      <p class="brand-subtitle" id="heroSubtitle">Cargando sistema...</p>
    </div>
    <div class="hero-actions">
      <span class="user-pill" id="userPill" style="display:none"></span>
      <button class="top-btn" id="logoutBtn" style="display:none" type="button">Cerrar sesión</button>
      <button class="top-pill" id="versionPill" type="button">v1.0</button>
    </div>
  </section>

  <section class="info-strip" id="statusStrip">Conectando con el sistema...</section>

  <section class="main-panel">
    <div class="panel-header">
      <div>
        <h2 class="panel-title">Módulos disponibles</h2>
        <div class="panel-meta" id="modulesMeta"></div>
      </div>
    </div>
    <div id="modulesGrid">
      <div class="loading-overlay">
        <div class="spinner"></div>
        Cargando módulos...
      </div>
    </div>
  </section>

  <div class="footer-note" id="footerNote">Portal SGMP · Los accesos se cargan desde configuración central.</div>
</div>

<!-- MODAL LOGIN -->
<div class="modal-backdrop" id="loginModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Acceso al sistema</h3>
    </div>
    <div class="msg error" id="loginErr"></div>
    <div class="field">
      <label for="loginUser">Usuario</label>
      <input id="loginUser" type="text" autocomplete="username" placeholder="tu_usuario" />
    </div>
    <div class="field">
      <label for="loginPass">Contraseña</label>
      <input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <div class="tools-row">
      <button class="main-btn top-btn" id="doLoginBtn" style="background:linear-gradient(135deg,#2548b8,#2f57d0);color:#fff;border-color:#2950c8;font-weight:800" type="button">Ingresar</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIGURACIÓN
// ══════════════════════════════════════════════
var API = 'https://script.google.com/macros/s/AKfycbyQZi1flaILc4e3I7MFp8gLctkzC6VccjfFz5aHluMrGZLwOUeS3uQaHPsMZ3l5yfDw-Q/exec';
var SESSION_KEY = 'sgmp_session_v1';

var SESSION = loadSession();

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function init() {
  apiGet('get_all')
    .then(function(res) {
      if (!res.ok) { showError('No se pudo conectar con el sistema.'); return; }

      var cfg     = res.data.global  || {};
      var modules = res.data.modules || [];

      // Aplicar config global
      var logo     = cfg.app_logo_emoji || '⚙️';
      var name     = cfg.app_name       || 'SGMP';
      var subtitle = cfg.app_subtitle   || 'Sistema de Gestión de Mejora de Procesos';
      var version  = cfg.app_version    || 'v1.0';
      var support  = cfg.support_text   || 'Portal SGMP · Los accesos se cargan desde configuración central.';

      document.getElementById('heroTitle').innerHTML    = logo + ' ' + esc(name);
      document.getElementById('heroSubtitle').textContent = subtitle;
      document.getElementById('versionPill').textContent  = version;
      document.getElementById('footerNote').textContent   = support;
      document.title = name;

      // ¿Requiere login?
      var loginRequired = cfg.login_required === 'SI';

      if (loginRequired && !SESSION.username) {
        showLoginModal(modules);
      } else {
        renderModules(modules);
        if (SESSION.username) {
          document.getElementById('userPill').textContent = '👤 ' + SESSION.username;
          document.getElementById('userPill').style.display = 'inline-block';
          document.getElementById('logoutBtn').style.display = 'inline-block';
        }
      }
    })
    .catch(function() {
      showError('Error de conexión. Verifica tu acceso a internet.');
    });
}

// ══════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════
function showLoginModal(modules) {
  document.getElementById('loginModal').classList.add('show');
  document.getElementById('statusStrip').textContent = 'Ingresa tus credenciales para acceder al sistema.';
  document.getElementById('modulesGrid').innerHTML =
    '<div class="empty-state">Ingresa sesión para ver los módulos disponibles.</div>';

  document.getElementById('doLoginBtn').onclick = function() {
    doLogin(modules);
  };

  document.getElementById('loginPass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin(modules);
  });
}

function doLogin(modules) {
  var u   = document.getElementById('loginUser').value.trim();
  var p   = document.getElementById('loginPass').value;
  var err = document.getElementById('loginErr');
  var btn = document.getElementById('doLoginBtn');

  if (!u || !p) { showMsg(err, 'Ingresa usuario y contraseña.'); return; }

  btn.textContent = 'Verificando...';
  btn.disabled    = true;

apiGet('user_login', { username: u, password: p })
  .then(function(res) {
   if (res.ok) {
  SESSION = {
    username: (res.user && res.user.username) || u,
    name: (res.user && res.user.name) || u,
    role: (res.user && res.user.role) || '',
    allowed_modules: res.allowed_modules || []
  };

  saveSession(SESSION);

  document.getElementById('loginModal').classList.remove('show');
  document.getElementById('userPill').textContent = '👤 ' + (((res.user && res.user.name) || (res.user && res.user.username) || u));
  document.getElementById('userPill').style.display  = 'inline-block';
  document.getElementById('logoutBtn').style.display = 'inline-block';

  var filteredModules = modules.filter(function(m) {
    return SESSION.allowed_modules.indexOf(m.code) !== -1;
  });

  renderModules(filteredModules);
      } else {
        showMsg(err, res.error || 'Credenciales incorrectas.');
        btn.textContent = 'Ingresar';
        btn.disabled    = false;
      }
    })
    .catch(function() {
      showMsg(err, 'Error de conexión.');
      btn.textContent = 'Ingresar';
      btn.disabled    = false;
    });
}

document.getElementById('logoutBtn').addEventListener('click', function() {
  clearSession();
  location.reload();
});

// ══════════════════════════════════════════════
// RENDER MÓDULOS
// ══════════════════════════════════════════════
function getModuleVisual(code) {
  var c = String(code || '').toUpperCase();
  var visuals = {
    LMP: { agent:'SYNAPSE', avatar:'./assets/avatars/a_lmp.jpg', accent:'#055BEF', slogan:'Analiza. Diseña. Transforma.' },
    SB:  { agent:'BUILDER', avatar:'./assets/avatars/a_sb.jpg',  accent:'#1769E8', slogan:'Visualiza. Ordena. Construye.' },
    ED:  { agent:'DOCSYS',  avatar:'./assets/avatars/a_ed.jpg',  accent:'#4A5568', slogan:'Evalúa. Filtra. Asegura.' },
    GD:  { agent:'GENESIS', avatar:'./assets/avatars/a_gd.jpg',  accent:'#2F855A', slogan:'Construye. Estandariza. Entrega.' },
    AD:  { agent:'AUDIX',   avatar:'./assets/avatars/a_ad.jpg',  accent:'#C0392B', slogan:'Audita. Mejora. Asegura.' }
  };
  return visuals[c] || { agent:c || 'SGMP', avatar:'./assets/avatars/a_sgmp.jpg', accent:'#0566FF', slogan:'Abrir módulo.' };
}

// ══════════════════════════════════════════════
// RENDER MÓDULOS
// ══════════════════════════════════════════════
function renderModules(modules) {
  var grid = document.getElementById('modulesGrid');
  var meta = document.getElementById('modulesMeta');
  var strip = document.getElementById('statusStrip');

  var visible = modules
    .filter(function(m) { return m.enabled === 'SI' || m.enabled === true; })
    .sort(function(a, b) { return (Number(a.order) || 0) - (Number(b.order) || 0); });

  grid.innerHTML = '';

  if (!visible.length) {
    grid.innerHTML = '<div class="empty-state">No hay módulos activos. El administrador debe activar los módulos desde el panel de configuración.</div>';
    meta.textContent = '0 módulos visibles';
    strip.textContent = 'No hay módulos disponibles en este momento.';
    return;
  }

  visible.forEach(function(mod) {
    var v = getModuleVisual(mod.code);
    var card = document.createElement('article');
    card.className = 'module-card' + ((!mod.url || mod.url === '#') ? ' disabled' : '');
    card.style.setProperty('--accent', v.accent);
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');

    card.innerHTML =
      '<div class="module-art">' +
        '<img src="' + esc(v.avatar) + '" alt="' + esc(v.agent + ' ' + mod.code) + '">' +
      '</div>' +
      '<div class="module-info">' +
        '<div class="module-top">' +
          '<div>' +
            '<h2>' + esc(v.agent) + '</h2>' +
            '<strong>' + esc(mod.code || '') + '</strong>' +
          '</div>' +
          '<div class="hex-icon">' + esc(mod.code || '') + '</div>' +
        '</div>' +
        '<p>' + esc(mod.name || 'Módulo SGMP') + '</p>' +
        '<div class="line"></div>' +
        '<em>' + esc(v.slogan || mod.description || 'Abrir módulo.') + '</em>' +
      '</div>' +
      '<div class="arrow">›</div>';

    function openModule() {
      if (mod.url && mod.url !== '#') window.location.href = mod.url;
    }

    card.addEventListener('click', openModule);
    card.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openModule();
      }
    });

    grid.appendChild(card);
  });

  meta.textContent  = visible.length + ' módulo' + (visible.length === 1 ? '' : 's') + ' disponible' + (visible.length === 1 ? '' : 's');
  strip.textContent = 'Selecciona el avatar del módulo que deseas abrir · ' + visible.map(function(m) { return m.order + '-' + m.code; }).join(' · ');
}

// ══════════════════════════════════════════════
// API
// ══════════════════════════════════════════════
function apiGet(action, params) {
  var url = API + '?action=' + encodeURIComponent(action);
  if (params) {
    Object.keys(params).forEach(function(k) {
      url += '&' + k + '=' + encodeURIComponent(params[k]);
    });
  }
  return fetch(url).then(function(r) { return r.json(); });
}

// ══════════════════════════════════════════════
// SESIÓN
// ══════════════════════════════════════════════
function loadSession() {
  try {
    var raw = sessionStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveSession(data) {
  try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(data)); } catch(e) {}
}

function clearSession() {
  try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {}
}

// ══════════════════════════════════════════════
// UTILIDADES
// ══════════════════════════════════════════════
function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function showMsg(el, msg) {
  el.textContent = msg;
  el.className   = 'msg error show';
}

function showError(msg) {
  document.getElementById('statusStrip').textContent = msg;
  document.getElementById('modulesGrid').innerHTML =
    '<div class="empty-state">⚠️ ' + esc(msg) + '</div>';
}

// ── Arrancar ──
init();
</script>
</body>
</html>
