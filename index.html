<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SGMP — Launcher</title>
<style>
:root {
  --navy:#051B4D;
  --blue:#0566FF;
  --cyan:#00BFFF;
  --green:#189B5B;
  --purple:#6F2CE8;
  --ink:#06183D;
  --muted:#53627A;
  --card:rgba(255,255,255,.84);
  --line:rgba(20,82,163,.16);
  --shadow:0 18px 45px rgba(7,38,86,.13);
}

* { box-sizing:border-box; margin:0; padding:0; }

html, body { min-height:100%; }

body {
  font-family:Inter, Poppins, "Segoe UI", Arial, sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 50% 27%, rgba(61,151,255,.22), transparent 35%),
    radial-gradient(circle at 8% 15%, rgba(5,102,255,.12), transparent 25%),
    radial-gradient(circle at 92% 20%, rgba(111,44,232,.10), transparent 25%),
    linear-gradient(180deg,#f7fbff 0%, #ecf5ff 52%, #f9fcff 100%);
  overflow-x:hidden;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.45;
  background:
    linear-gradient(120deg, transparent 0 15%, rgba(46,125,255,.06) 15.2%, transparent 16% 100%),
    radial-gradient(circle at 50% 46%, transparent 0 22%, rgba(0,137,255,.07) 22.2% 22.5%, transparent 22.8% 100%),
    radial-gradient(circle at 50% 46%, transparent 0 29%, rgba(0,137,255,.06) 29.2% 29.5%, transparent 29.8% 100%);
}

button, input { font:inherit; }

.launcher {
  width:min(1520px, 100%);
  margin:0 auto;
  padding:clamp(18px,2.2vw,34px);
  position:relative;
  z-index:1;
}

.header {
  text-align:center;
  margin-bottom:clamp(16px,2vw,26px);
  position:relative;
}

.header h1 {
  font-size:clamp(58px,8vw,132px);
  letter-spacing:.03em;
  line-height:.82;
  font-weight:950;
  color:var(--navy);
}

.header p {
  margin-top:clamp(10px,1vw,16px);
  font-weight:850;
  font-size:clamp(20px,2.4vw,34px);
  color:#061b48;
}

.triad-text {
  display:flex;
  justify-content:center;
  gap:clamp(12px,2.4vw,34px);
  align-items:center;
  flex-wrap:wrap;
  margin-top:16px;
  font-weight:750;
  font-size:clamp(14px,1.3vw,19px);
}

.triad-text span:nth-child(1) { color:var(--blue); }
.triad-text span:nth-child(2) { color:var(--green); }
.triad-text span:nth-child(3) { color:var(--purple); }

.top-actions {
  position:absolute;
  top:0;
  right:0;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.user-pill,
.top-btn,
.top-pill {
  border-radius:12px;
  padding:9px 14px;
  border:1px solid rgba(5,102,255,.16);
  background:rgba(255,255,255,.72);
  color:#0B2458;
  font-weight:850;
  box-shadow:0 8px 18px rgba(7,38,86,.08);
  cursor:pointer;
}

.status-strip {
  width:min(920px,100%);
  margin:0 auto clamp(14px,1.5vw,20px);
  text-align:center;
  background:rgba(255,255,255,.72);
  border:1px solid var(--line);
  border-radius:18px;
  color:#214a97;
  padding:13px 18px;
  font-weight:750;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}

.modules-meta {
  text-align:center;
  color:var(--muted);
  font-weight:800;
  margin-bottom:14px;
}

.modules-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
  gap:clamp(14px,1.4vw,20px);
}

.module-card {
  appearance:none;
  position:relative;
  min-height:clamp(150px,13vw,190px);
  display:grid;
  grid-template-columns:36% 1fr 34px;
  align-items:stretch;
  overflow:hidden;
  border-radius:18px;
  background:var(--card);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:transform .28s ease, box-shadow .28s ease, border-color .28s ease;
  backdrop-filter:blur(10px);
}

.module-card.disabled {
  opacity:.55;
  cursor:not-allowed;
}

.module-card::before {
  content:"";
  position:absolute;
  inset:0 auto 0 0;
  width:8px;
  background:var(--accent);
}

.module-card:hover {
  transform:translateY(-8px) scale(1.015);
  box-shadow:0 30px 64px rgba(7,38,86,.20);
  border-color:color-mix(in srgb, var(--accent), white 45%);
}

.module-art {
  background:linear-gradient(135deg, color-mix(in srgb, var(--accent), #001A44 60%), rgba(255,255,255,.16));
  overflow:hidden;
}

.module-art img {
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
  transition:transform .35s ease;
}

.module-card:hover .module-art img {
  transform:scale(1.07);
}

.module-info {
  padding:clamp(14px,1.4vw,22px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
}

.module-top {
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
}

.module-info h2 {
  font-size:clamp(22px,2vw,32px);
  line-height:1;
  color:var(--accent);
  font-weight:950;
  letter-spacing:.01em;
}

.module-info strong {
  display:block;
  margin-top:6px;
  color:var(--navy);
  font-size:clamp(17px,1.5vw,23px);
  font-weight:900;
}

.module-info p {
  margin-top:5px;
  font-weight:700;
  color:#0d2551;
  font-size:clamp(13px,1.1vw,16px);
  line-height:1.25;
}

.module-info .line {
  width:68%;
  height:1px;
  background:color-mix(in srgb, var(--accent), white 58%);
  margin:10px 0 8px;
}

.module-info em {
  color:var(--accent);
  font-style:normal;
  font-weight:800;
  font-size:clamp(13px,1.1vw,16px);
  line-height:1.25;
}

.hex-icon {
  display:grid;
  place-items:center;
  width:clamp(42px,3.6vw,54px);
  height:clamp(42px,3.6vw,54px);
  color:var(--accent);
  font-weight:950;
  font-size:12px;
  border:3px solid currentColor;
  clip-path:polygon(25% 5%,75% 5%,100% 50%,75% 95%,25% 95%,0 50%);
  background:rgba(255,255,255,.72);
  flex:0 0 auto;
}

.arrow {
  display:grid;
  place-items:center;
  color:#0B1E4E;
  font-size:42px;
  padding-right:10px;
}

.empty-state {
  grid-column:1/-1;
  border:1px dashed rgba(20,82,163,.22);
  border-radius:18px;
  background:rgba(255,255,255,.72);
  color:var(--muted);
  padding:28px;
  text-align:center;
  font-weight:700;
  box-shadow:var(--shadow);
}

.loading-overlay {
  grid-column:1/-1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:48px 20px;
  gap:14px;
  color:var(--muted);
  font-weight:700;
}

.spinner {
  width:34px;
  height:34px;
  border:3px solid rgba(5,102,255,.14);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin .7s linear infinite;
}

@keyframes spin { to { transform:rotate(360deg); } }

.footer-note {
  margin-top:20px;
  text-align:center;
  color:#60789b;
  font-size:.9rem;
  font-weight:700;
}

.modal-backdrop {
  position:fixed;
  inset:0;
  background:rgba(5,20,54,.54);
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:100;
  backdrop-filter:blur(7px);
}

.modal-backdrop.show { display:flex; }

.modal {
  width:min(440px,100%);
  background:rgba(248,251,255,.96);
  border:1px solid var(--line);
  border-radius:22px;
  box-shadow:0 26px 64px rgba(7,38,86,.22);
  padding:28px 24px;
}

.modal-title {
  margin:0 0 20px;
  color:var(--navy);
  font-size:1.22rem;
  font-weight:900;
}

.field {
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:14px;
}

.field label {
  color:#4d6790;
  font-size:.88rem;
  font-weight:800;
}

.field input {
  width:100%;
  border-radius:12px;
  border:1px solid rgba(20,82,163,.18);
  background:#fff;
  color:var(--ink);
  padding:12px 13px;
  outline:none;
}

.field input:focus {
  border-color:#90afe8;
  box-shadow:0 0 0 4px rgba(40,82,191,.10);
}

.main-btn {
  border-radius:12px;
  padding:10px 16px;
  cursor:pointer;
  background:linear-gradient(135deg,#0566FF,#2f57d0);
  color:#fff;
  border:1px solid #2950c8;
  font-weight:900;
}

.msg {
  display:none;
  margin-bottom:14px;
  border-radius:12px;
  padding:11px 13px;
  font-size:.92rem;
  font-weight:700;
}

.msg.show { display:block; }
.msg.error { background:#fff4f4; color:#b43f3f; border:1px solid #f0c9c9; }

.tools-row {
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:6px;
}

@media (min-width:1101px) {
  html, body {
    min-height:100svh;
    overflow:hidden;
  }

  .launcher {
    height:100svh;
    min-height:100svh;
    overflow:hidden;
    display:grid;
    grid-template-rows:auto auto auto minmax(0,1fr) auto;
    gap:clamp(6px,.9vh,12px);
    padding:clamp(8px,1.1vh,14px) clamp(16px,1.7vw,28px) clamp(16px,2vh,22px);
  }

  .header h1 {
    font-size:clamp(58px,7.1vh,92px);
  }

  .header p {
    margin-top:clamp(5px,.7vh,9px);
    font-size:clamp(18px,2.4vh,27px);
  }

  .triad-text {
    margin-top:clamp(6px,.9vh,10px);
    font-size:clamp(13px,1.6vh,17px);
  }

  .modules-grid {
    min-height:0;
    overflow:hidden;
    grid-template-columns:repeat(3,minmax(270px,1fr));
    gap:clamp(10px,1.2vw,16px);
  }

  .module-card {
    min-height:clamp(108px,14.2vh,142px);
    max-height:142px;
    border-radius:16px;
    grid-template-columns:34% 1fr 28px;
  }

  .module-info {
    padding:clamp(10px,1.2vh,16px) clamp(11px,1.1vw,16px);
  }

  .module-info h2 {
    font-size:clamp(18px,2.5vh,25px);
  }

  .module-info strong {
    margin-top:3px;
    font-size:clamp(14px,1.9vh,19px);
  }

  .module-info p,
  .module-info em {
    font-size:clamp(11px,1.45vh,14px);
  }
}

@media (max-width:900px) {
  .top-actions {
    position:static;
    justify-content:center;
    margin-top:12px;
  }

  .modules-grid {
    grid-template-columns:1fr;
  }
}

@media (max-width:480px) {
  .launcher { padding:18px 14px 28px; }
  .header h1 { font-size:clamp(52px,18vw,86px); }
  .header p { font-size:clamp(17px,5vw,24px); }

  .module-card {
    grid-template-columns:38% 1fr 24px;
  }

  .hex-icon {
    display:none;
  }

  .module-info {
    padding:12px;
  }

  .arrow {
    font-size:30px;
    padding-right:6px;
  }
}
</style>
</head>
<body>
<main class="launcher">
  <header class="header">
    <div class="top-actions">
      <span class="user-pill" id="userPill" style="display:none"></span>
      <button class="top-btn" id="logoutBtn" style="display:none" type="button">Cerrar sesión</button>
      <button class="top-pill" id="versionPill" type="button">v1.0</button>
    </div>

    <h1 id="heroTitle">SGMP</h1>
    <p id="heroSubtitle">Sistema de Gestión y Mejora de Procesos</p>
    <div class="triad-text">
      <span>Procesos inteligentes.</span>
      <span>Personas comprometidas.</span>
      <span>Tecnología que transforma.</span>
    </div>
  </header>

  <section class="status-strip" id="statusStrip">Conectando con el sistema...</section>
  <div class="modules-meta" id="modulesMeta"></div>

  <section class="modules-grid" id="modulesGrid" aria-label="Módulos SGMP">
    <div class="loading-overlay">
      <div class="spinner"></div>
      Cargando módulos...
    </div>
  </section>

  <div class="footer-note" id="footerNote">Portal SGMP · Los accesos se cargan desde configuración central.</div>
</main>

<div class="modal-backdrop" id="loginModal">
  <div class="modal">
    <h3 class="modal-title">Acceso al sistema</h3>
    <div class="msg error" id="loginErr"></div>
    <div class="field">
      <label for="loginUser">Usuario</label>
      <input id="loginUser" type="text" autocomplete="username" placeholder="tu_usuario" />
    </div>
    <div class="field">
      <label for="loginPass">Contraseña</label>
      <input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <div class="tools-row">
      <button class="main-btn" id="doLoginBtn" type="button">Ingresar</button>
    </div>
  </div>
</div>

<script>

// ══════════════════════════════════════════════
// CONFIGURACIÓN
// ══════════════════════════════════════════════
var API = 'https://script.google.com/macros/s/AKfycbyQZi1flaILc4e3I7MFp8gLctkzC6VccjfFz5aHluMrGZLwOUeS3uQaHPsMZ3l5yfDw-Q/exec';
var SESSION_KEY = 'sgmp_session_v1';

var SESSION = loadSession();

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function init() {
  apiGet('get_all')
    .then(function(res) {
      if (!res.ok) { showError('No se pudo conectar con el sistema.'); return; }

      var cfg     = res.data.global  || {};
      var modules = res.data.modules || [];

      // Aplicar config global
      var logo     = cfg.app_logo_emoji || '⚙️';
      var name     = cfg.app_name       || 'SGMP';
      var subtitle = cfg.app_subtitle   || 'Sistema de Gestión de Mejora de Procesos';
      var version  = cfg.app_version    || 'v1.0';
      var support  = cfg.support_text   || 'Portal SGMP · Los accesos se cargan desde configuración central.';

      document.getElementById('heroTitle').innerHTML    = logo + ' ' + esc(name);
      document.getElementById('heroSubtitle').textContent = subtitle;
      document.getElementById('versionPill').textContent  = version;
      document.getElementById('footerNote').textContent   = support;
      document.title = name;

      // ¿Requiere login?
      var loginRequired = cfg.login_required === 'SI';

      if (loginRequired && !SESSION.username) {
        showLoginModal(modules);
      } else {
        renderModules(modules);
        if (SESSION.username) {
          document.getElementById('userPill').textContent = '👤 ' + SESSION.username;
          document.getElementById('userPill').style.display = 'inline-block';
          document.getElementById('logoutBtn').style.display = 'inline-block';
        }
      }
    })
    .catch(function() {
      showError('Error de conexión. Verifica tu acceso a internet.');
    });
}

// ══════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════
function showLoginModal(modules) {
  document.getElementById('loginModal').classList.add('show');
  document.getElementById('statusStrip').textContent = 'Ingresa tus credenciales para acceder al sistema.';
  document.getElementById('modulesGrid').innerHTML =
    '<div class="empty-state">Ingresa sesión para ver los módulos disponibles.</div>';

  document.getElementById('doLoginBtn').onclick = function() {
    doLogin(modules);
  };

  document.getElementById('loginPass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin(modules);
  });
}

function doLogin(modules) {
  var u   = document.getElementById('loginUser').value.trim();
  var p   = document.getElementById('loginPass').value;
  var err = document.getElementById('loginErr');
  var btn = document.getElementById('doLoginBtn');

  if (!u || !p) { showMsg(err, 'Ingresa usuario y contraseña.'); return; }

  btn.textContent = 'Verificando...';
  btn.disabled    = true;

apiGet('user_login', { username: u, password: p })
  .then(function(res) {
   if (res.ok) {
  SESSION = {
    username: (res.user && res.user.username) || u,
    name: (res.user && res.user.name) || u,
    role: (res.user && res.user.role) || '',
    allowed_modules: res.allowed_modules || []
  };

  saveSession(SESSION);

  document.getElementById('loginModal').classList.remove('show');
  document.getElementById('userPill').textContent = '👤 ' + (((res.user && res.user.name) || (res.user && res.user.username) || u));
  document.getElementById('userPill').style.display  = 'inline-block';
  document.getElementById('logoutBtn').style.display = 'inline-block';

  var filteredModules = modules.filter(function(m) {
    return SESSION.allowed_modules.indexOf(m.code) !== -1;
  });

  renderModules(filteredModules);
      } else {
        showMsg(err, res.error || 'Credenciales incorrectas.');
        btn.textContent = 'Ingresar';
        btn.disabled    = false;
      }
    })
    .catch(function() {
      showMsg(err, 'Error de conexión.');
      btn.textContent = 'Ingresar';
      btn.disabled    = false;
    });
}

document.getElementById('logoutBtn').addEventListener('click', function() {
  clearSession();
  location.reload();
});

// ══════════════════════════════════════════════
// RENDER MÓDULOS
// ══════════════════════════════════════════════
function getModuleVisual(code) {
  var c = String(code || '').toUpperCase();
  var map = {
    LMP: { agent:'SYNAPSE', avatar:'./assets/avatars/a_lmp.jpg', accent:'#055BEF', slogan:'Analiza. Diseña. Transforma.' },
    SB:  { agent:'BUILDER', avatar:'./assets/avatars/a_sb.jpg',  accent:'#1769E8', slogan:'Visualiza. Ordena. Construye.' },
    ED:  { agent:'DOCSYS',  avatar:'./assets/avatars/a_ed.jpg',  accent:'#4A5568', slogan:'Evalúa. Filtra. Asegura.' },
    GD:  { agent:'GENESIS', avatar:'./assets/avatars/a_gd.jpg',  accent:'#2F855A', slogan:'Construye. Estandariza. Entrega.' },
    AD:  { agent:'AUDIX',   avatar:'./assets/avatars/a_ad.jpg',  accent:'#C0392B', slogan:'Audita. Mejora. Asegura.' }
  };
  return map[c] || { agent:c || 'SGMP', avatar:'./assets/avatars/a_sgmp.jpg', accent:'#0566FF', slogan:'Abrir módulo.' };
}

// ══════════════════════════════════════════════
// RENDER MÓDULOS
// ══════════════════════════════════════════════
function renderModules(modules) {
  var grid = document.getElementById('modulesGrid');
  var meta = document.getElementById('modulesMeta');
  var strip = document.getElementById('statusStrip');

  var visible = modules
    .filter(function(m) { return m.enabled === 'SI' || m.enabled === true; })
    .sort(function(a, b) { return (Number(a.order) || 0) - (Number(b.order) || 0); });

  grid.innerHTML = '';

  if (!visible.length) {
    grid.innerHTML = '<div class="empty-state">No hay módulos activos. El administrador debe activar los módulos desde el panel de configuración.</div>';
    meta.textContent = '0 módulos visibles';
    strip.textContent = 'No hay módulos disponibles en este momento.';
    return;
  }

  visible.forEach(function(mod) {
    var v = getModuleVisual(mod.code);
    var card = document.createElement('article');
    card.className = 'module-card' + ((!mod.url || mod.url === '#') ? ' disabled' : '');
    card.style.setProperty('--accent', v.accent);
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', 'Abrir ' + (mod.code || 'módulo'));

    card.innerHTML =
      '<div class="module-art">' +
        '<img src="' + esc(v.avatar) + '" alt="' + esc(v.agent + ' ' + mod.code) + '" />' +
      '</div>' +
      '<div class="module-info">' +
        '<div class="module-top">' +
          '<div>' +
            '<h2>' + esc(v.agent) + '</h2>' +
            '<strong>' + esc(mod.code || '') + '</strong>' +
          '</div>' +
          '<div class="hex-icon">' + esc(mod.code || '') + '</div>' +
        '</div>' +
        '<p>' + esc(mod.name || 'Módulo SGMP') + '</p>' +
        '<div class="line"></div>' +
        '<em>' + esc(v.slogan || mod.description || 'Abrir módulo.') + '</em>' +
      '</div>' +
      '<div class="arrow">›</div>';

    function openModule() {
      if (mod.url && mod.url !== '#') window.location.href = mod.url;
    }

    card.addEventListener('click', openModule);
    card.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openModule();
      }
    });

    grid.appendChild(card);
  });

  meta.textContent  = visible.length + ' módulo' + (visible.length === 1 ? '' : 's') + ' disponible' + (visible.length === 1 ? '' : 's');
  strip.textContent = 'Selecciona el avatar del módulo que deseas abrir · ' + visible.map(function(m) { return m.order + '-' + m.code; }).join(' · ');
}

// ══════════════════════════════════════════════
// API
// ══════════════════════════════════════════════
function apiGet(action, params) {
  var url = API + '?action=' + encodeURIComponent(action);
  if (params) {
    Object.keys(params).forEach(function(k) {
      url += '&' + k + '=' + encodeURIComponent(params[k]);
    });
  }
  return fetch(url).then(function(r) { return r.json(); });
}

// ══════════════════════════════════════════════
// SESIÓN
// ══════════════════════════════════════════════
function loadSession() {
  try {
    var raw = sessionStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveSession(data) {
  try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(data)); } catch(e) {}
}

function clearSession() {
  try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {}
}

// ══════════════════════════════════════════════
// UTILIDADES
// ══════════════════════════════════════════════
function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function showMsg(el, msg) {
  el.textContent = msg;
  el.className   = 'msg error show';
}

function showError(msg) {
  document.getElementById('statusStrip').textContent = msg;
  document.getElementById('modulesGrid').innerHTML =
    '<div class="empty-state">⚠️ ' + esc(msg) + '</div>';
}

// ── Arrancar ──
init();

</script>
